<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Customer Login</title>
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container card shadow-sm p-4" style="max-width: 400px;">
        <h2 class="text-center mb-4">Customer Login</h2>
        <form method="POST">
            <input type="email" name="email" class="form-control mb-3" placeholder="user@example.com" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="password123" required>
            <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>
        <div class="mt-3 text-center"><a href="/">Back to Shop</a></div>
    </div>
</body>
</html>
