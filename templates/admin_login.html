<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | SwiftShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #2c3e50; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card { 
            background: white; 
            border-radius: 15px; 
            padding: 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 400px; 
        }
        .btn-admin { 
            background-color: #e74c3c; 
            color: white; 
            border: none; 
            border-radius: 25px; 
            padding: 12px;
            font-weight: bold;
            transition: background 0.3s ease;
        }
        .btn-admin:hover { 
            background-color: #c0392b; 
            color: white; 
        }
        .form-control {
            border-radius: 8px;
            padding: 10px 15px;
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="login-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold mb-1">Admin Portal</h2>
                <p class="text-muted small">Secure Access Only</p>
            </div>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="alert alert-danger small py-2 shadow-sm">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('admin_login') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">Admin Email</label>
                    <input type="email" name="email" class="form-control" placeholder="admin@store.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-admin w-100">Unlock Dashboard</button>
            </form>

            <div class="text-center mt-4">
                <a href="{{ url_for('home') }}" class="text-muted small text-decoration-none">
                    <i class="bi bi-arrow-left"></i> ← Return to Shop
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
